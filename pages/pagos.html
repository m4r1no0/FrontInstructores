<div class="container-fluid">
    <div class="card">
        <div class="card-header">
            <h3>Gestión de Pagos</h3>
            <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#ModalAgregarPago">
                <i class="bi bi-plus-circle"></i> Registrar Pago
            </button>
        </div>
        <div class="card-body">
            <div class="table-responsive">
                <table class="table table-bordered" id="dataTablePago" width="100%">
                    <thead>
                        <tr>
                            <th>Acciones</th>
                            <th>Contrato</th>
                            <th>Instructor</th>
                            <th>Fecha inicio</th>
                            <th>Fecha fin</th>
                            <th>Valor contrato</th>
                            <th>Valor mes</th>
                            <th>Valor AdDi</th>
                            <th>Vigencia</th>
                            <th>Fecha Registro</th>
                        </tr>
                    </thead>
                    <tbody class="cuerpoTabla"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<!-- Modal AGREGAR PAGO -->
<div class="modal fade" id="ModalAgregarPago" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Registrar Pago</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <form id="formPago">
                <div class="modal-body">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label>Contrato *</label>
                            <select id="id_contrato" class="form-control" required>
                                <option value="">Seleccione...</option>
                            </select>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label>Mes *</label>
                            <input type="month" id="mes" class="form-control" required>
                        </div>
                        <div class="col-md-4 mb-3">
                            <label>Valor Base *</label>
                            <input type="number" id="valor_base" class="form-control" step="0.01" required>
                        </div>
                        <div class="col-md-4 mb-3">
                            <label>Ajuste</label>
                            <input type="number" id="ajuste" class="form-control" step="0.01" value="0">
                            <small class="text-muted">Positivo = Bono, Negativo = Descuento</small>
                        </div>
                        <div class="col-md-4 mb-3">
                            <label>Valor Pagado *</label>
                            <input type="number" id="valor_pagado" class="form-control" step="0.01" required>
                        </div>
                        <div class="col-md-12 mb-3">
                            <label>Saldo Calculado</label>
                            <input type="text" id="saldo_calculado" class="form-control" readonly>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="submit" class="btn btn-primary">Guardar Pago</button>
                </div>
            </form>
        </div>
    </div>
</div>
