<!-- Gestión de Pagos por Contrato -->
<div class="container-fluid">
    <h2>Gestión de Pagos</h2>
    
    <!-- Selector de Contrato -->
    <div class="card mb-4">
        <div class="card-header">
            <h5>Seleccionar Contrato</h5>
        </div>
        <div class="card-body">
            <div class="row">
                <div class="col-md-4">
                    <label for="selectContrato">Contrato:</label>
                    <select id="selectContrato" class="form-select">
                        <option value="">Seleccione un contrato...</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <label>Estado:</label>
                    <div id="estadoContrato" class="form-control-plaintext"></div>
                </div>
                <div class="col-md-3">
                    <label>Instructor:</label>
                    <div id="nombreInstructor" class="form-control-plaintext"></div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Tabla de Pagos -->
    <div class="card">
        <div class="card-header d-flex justify-content-between align-items-center">
            <h5>Pagos Realizados</h5>
            <button class="btn btn-primary btn-sm" id="btnAgregarPago">
                <i class="bi bi-plus-lg"></i> Agregar Pago
            </button>
        </div>
        <div class="card-body">
            <table id="tablaPagos" class="table table-bordered table-striped">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Mes</th>
                        <th>Valor Base</th>
                        <th>Ajuste</th>
                        <th>Valor Pagado</th>
                        <th>Saldo</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody>
                </tbody>
                <tfoot>
                    <tr class="table-info">
                        <th colspan="4" class="text-end">Totales:</th>
                        <th id="totalPagado">$0</th>
                        <th id="totalSaldo">$0</th>
                        <th></th>
                    </tr>
                </tfoot>
            </table>
        </div>
    </div>
</div>

<!-- Modal Agregar/Editar Pago -->
<div class="modal fade" id="modalPago" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Registrar Pago</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="formPago">
                    <input type="hidden" id="id_pago">
                    <input type="hidden" id="id_contrato_pago">
                    
                    <div class="mb-3">
                        <label for="mes" class="form-label">Mes *</label>
                        <select id="mes" class="form-select" required>
                            <option value="">Seleccione mes...</option>
                            <option value="Enero">Enero</option>
                            <option value="Febrero">Febrero</option>
                            <option value="Marzo">Marzo</option>
                            <option value="Abril">Abril</option>
                            <option value="Mayo">Mayo</option>
                            <option value="Junio">Junio</option>
                            <option value="Julio">Julio</option>
                            <option value="Agosto">Agosto</option>
                            <option value="Septiembre">Septiembre</option>
                            <option value="Octubre">Octubre</option>
                            <option value="Noviembre">Noviembre</option>
                            <option value="Diciembre">Diciembre</option>
                        </select>
                    </div>
                    
                    <div class="mb-3">
                        <label for="valor_base" class="form-label">Valor Base *</label>
                        <input type="number" id="valor_base" class="form-control" step="0.01" required>
                    </div>
                    
                    <div class="mb-3">
                        <label for="ajuste" class="form-label">Ajuste</label>
                        <input type="number" id="ajuste" class="form-control" step="0.01" value="0">
                        <small class="text-muted">Positivo = aumento, Negativo = descuento</small>
                    </div>
                    
                    <div class="mb-3">
                        <label for="valor_pagado" class="form-label">Valor Pagado *</label>
                        <input type="number" id="valor_pagado" class="form-control" step="0.01" required>
                    </div>
                    
                    <div class="mb-3">
                        <label for="saldo" class="form-label">Saldo</label>
                        <input type="number" id="saldo" class="form-control" step="0.01" readonly>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                <button type="button" class="btn btn-primary" id="btnGuardarPago">Guardar</button>
            </div>
        </div>
    </div>
</div>
