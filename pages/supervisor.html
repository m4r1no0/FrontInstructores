<div class="card shadow mb-4">
    <div class="card-header py-3 d-flex flex-row align-items-center justify-content-between">
        <h6 class="m-0 font-weight-bold text-primary">Gestión de Supervisores</h6>
        <button class="btn btn-primary btn-sm" data-bs-toggle="modal" data-bs-target="#ModalAgregarSupervisor">
            <i class="bi bi-plus-circle"></i> Agregar Supervisor
        </button>
    </div>
    <div class="card-body">
        <div class="table-responsive">
            <table class="table table-bordered table-hover" id="dataTableSupervisor" width="100%" cellspacing="0">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Nombre</th>
                        <th>Documento</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody class="cuerpoTablaSupervisor">
                </tbody>
            </table>
        </div>
    </div>
</div>

<!-- MODAL AGREGAR SUPERVISOR -->
<div class="modal fade" id="ModalAgregarSupervisor" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <form id="formAgregarSupervisor">
                <div class="modal-header">
                    <h5 class="modal-title">Agregar Supervisor</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <div class="row">
                        <div class="col-md-12 mb-3">
                            <label for="nombre_agregar" class="form-label">Nombre Completo *</label>
                            <input type="text" class="form-control" id="nombre_agregar" required>
                        </div>
                        <div class="col-md-12 mb-3">
                            <label for="documento_agregar" class="form-label">Número de Documento *</label>
                            <input type="text" class="form-control" id="documento_agregar" required>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="submit" class="btn btn-primary">Guardar</button>
                </div>
            </form>
        </div>
    </div>
</div>

<!-- MODAL ACTUALIZAR SUPERVISOR -->
<div class="modal fade" id="ModalActualizarSupervisor" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <form id="formActualizarSupervisor">
                <div class="modal-header">
                    <h5 class="modal-title">Actualizar Supervisor</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="id_supervisor_update">
                    <div class="row">
                        <div class="col-md-12 mb-3">
                            <label for="nombre_actualizar" class="form-label">Nombre Completo</label>
                            <input type="text" class="form-control" id="nombre_actualizar" required>
                        </div>
                        <div class="col-md-12 mb-3">
                            <label for="documento_actualizar" class="form-label">Número de Documento</label>
                            <input type="text" class="form-control" id="documento_actualizar" required>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="submit" class="btn btn-warning">Actualizar</button>
                </div>
            </form>
        </div>
    </div>
</div>

<!-- MODAL ELIMINAR SUPERVISOR -->
<div class="modal fade" id="ModalEliminarSupervisor" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <form id="formEliminarSupervisor">
                <div class="modal-header">
                    <h5 class="modal-title">Eliminar Supervisor</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="id_supervisor_eliminar">
                    <div class="alert alert-warning">
                        <i class="bi bi-exclamation-triangle"></i>
                        <strong>¡Advertencia!</strong>
                        <p>¿Está seguro que desea eliminar este supervisor?</p>
                        <p class="mb-0 text-danger">Esta acción no se puede deshacer.</p>
                    </div>
                    <div class="row">
                        <div class="col-md-12 mb-3">
                            <label for="nombre_eliminar" class="form-label">Nombre Completo</label>
                            <input type="text" class="form-control" id="nombre_eliminar" readonly disabled>
                        </div>
                        <div class="col-md-12 mb-3">
                            <label for="documento_eliminar" class="form-label">Número de Documento</label>
                            <input type="text" class="form-control" id="documento_eliminar" readonly disabled>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="submit" class="btn btn-danger">Eliminar</button>
                </div>
            </form>
        </div>
    </div>
</div>
