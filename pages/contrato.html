<!-- contrato.html -->
<div class="container-fluid">
    <h2>Gestión de Contratos</h2>
    
    <table id="dataTableContrato" class="table table-striped table-bordered" style="width:100%">
        <thead>
            <tr>
                <th>Acciones</th>
                <th>ID</th>
                <th>No. Contrato</th>
                <th>Nombres</th>
                <th>Documento</th>
               <th>CRP</th>
            </tr>
        </thead>
        <tbody>
            <!-- Los datos se llenarán dinámicamente -->
        </tbody>
    </table>
</div>

<!-- Modal Agregar Contrato -->
<div class="modal fade" id="ModalAgregarContrato" tabindex="-1" aria-labelledby="ModalAgregarContratoLabel" aria-hidden="true">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <form id="formContrato">
                <div class="modal-header">
                    <h5 class="modal-title" id="ModalAgregarContratoLabel">Agregar Contrato</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>

                <div class="modal-body">
                    <!-- Campo oculto para el ID del instructor -->
                    <input type="hidden" id="id_instructor" name="id_instructor">

                    <div class="row">
                        <div class="col-md-12">
                            <label for="numero_contrato" class="form-label">No. Contrato *</label>
                            <input class="form-control" type="text" id="numero_contrato" required>
                        </div>
                    </div>

                    <div class="row mt-3">
                        <div class="col-md-6">
                            <label for="CRP" class="form-label">CRP</label>
                            <input type="number" id="CRP" class="form-control">
                        </div>
                        <div class="col-md-6">
                            <label for="CDP" class="form-label">CDP *</label>
                            <input class="form-control" type="number" id="CDP" required>
                        </div>
                    </div>

                    <div class="row mt-3">
                        <div class="col-md-6">
                            <label for="rubro" class="form-label">Rubro *</label>
                            <input class="form-control" type="text" id="rubro" required>
                        </div>
                        <div class="col-md-6">
                            <label for="dependencia" class="form-label">Dependencia *</label>
                            <input class="form-control" type="text" id="dependencia" required>
                        </div>
                    </div>

                    <div class="row mt-3">
                        <div class="col-md-6">
                            <label for="fecha_inicio" class="form-label">Fecha Inicio *</label>
                            <input class="form-control" type="date" id="fecha_inicio" required>
                        </div>
                        <div class="col-md-6">
                            <label for="fecha_fin" class="form-label">Fecha Fin *</label>
                            <input class="form-control" type="date" id="fecha_fin" required>
                        </div>
                    </div>

                    <div class="row mt-3">
                        <div class="col-md-6">
                            <label for="valorContrato" class="form-label">Valor Contrato</label>
                            <input type="number" id="valor_contrato" class="form-control">
                        </div>
                        <div class="col-md-6">
                            <label for="valorMes" class="form-label">Valor Mes</label>
                            <input type="number" id="valorMes" class="form-control">
                        </div>
                    </div>
                </div>

                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="submit" class="btn btn-primary">Guardar Contrato</button>
                </div>
            </form>
        </div>
    </div>
</div>
