<!-- contrato.html -->
<div class="container-fluid">
    <h2>Gestión de Contratos</h2>
    
    
    <table id="dataTableContrato" class="table table-striped table-bordered" style="width:100%">
        <thead>
            <tr>
                <th>ID</th>
                <th>Instructor</th>
                <th>No. Contrato</th>
                <th>Fecha Inicio</th>
                <th>Fecha Fin</th>
                <th>Vigencia</th>
                <th>Valor Contrato</th>
                <th>Estado</th>
                <th>CDP</th>
                <th>CRP</th>
                <th>Rubro</th>
                <th>Dependencia</th>
            </tr>
        </thead>
        <tbody>
            <!-- Los datos se llenarán dinámicamente -->
        </tbody>
    </table>
</div>

<div class="modal fade" id="ModalAgregarContrato" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      
      <form id="formContrato">

        <div class="modal-header">
          <h5 class="modal-title">Agregar Contrato</h5>
          <button type="button" class="btn btn-danger" data-bs-dismiss="modal">X</button>
        </div>

        <div class="modal-body">

          <div class="row">
            <div class="col">
              <label for="numeroContrato">No.contrato</label>
              <input class="form-control" type="text" id="numeroContrato" required>
            </div>
          </div>

          <div class="row mt-2">
            <div class="col">
                <label for="CRP">CRP</label>
              <input type="number" id="CRP" class="form-control">
            </div>
            <div class="col">
              <label for="CDP">CDP</label>
              <input class="form-control" type="number" id="CDP" required>
            </div>
          </div>

          <div class="row mt-2">
            <div class="col">
              <label for="rubro">Rubro</label>
              <input class="form-control" type="text" id="rubro" required>
            </div>
            <div class="col">
              <label for="dependencia">Dependencia</label>
              <input class="form-control" type="text" id="dependencia" required>
            </div>
          </div>
          <div class="row mt-2">
            <div class="col">
                <label for="fecha_inicio">Fecha Inicio</label>
              <input class="form-control" type="date" id="fecha_inicio" required>
            </div>
            <div class="col">
                <label for="fechaFin">Fecha Fin</label>
              <input class="form-control" type="date" id="fechaFin" required>
            </div>
          </div>
          <div class="row mt-2">
            <div class="col">
                <label for="valorContrato">Valor contrato</label>
                <input type="text" name="" id="valorContrato" class="form-control">
            </div>
            <div class="col">
                <label for="valorMes">Valor mes</label>
                <input type="text" name="" id="valorMes" class="form-control">
            </div>
          </div>

        </div>

        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
            Cancelar
          </button>
          <button type="submit" class="btn btn-primary">
            Guardar
          </button>
        </div>

      </form>

    </div>
  </div>
</div>
